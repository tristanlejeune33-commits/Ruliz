# Single-package workspace declaration so pnpm v11+ doesn't complain on builders.
packages:
  - .

# Allow these packages to run their postinstall build scripts.
# (Prisma needs it to compile the engine, sharp for image optim, etc.)
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
