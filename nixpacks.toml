# Nixpacks build config for Railway.
# Pin Node.js 22 LTS — Node 24 (default) breaks Corepack + pnpm with
# ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING.

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm db:generate", "pnpm build"]

[start]
# En prod, Railway injecte DATABASE_URL directement dans le process env,
# donc on appelle prisma directement (sans dotenv-cli qui chercherait
# .env.local et n'existe pas en prod).
cmd = "pnpm db:deploy:prod && pnpm start"
