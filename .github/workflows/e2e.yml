name: E2E Tests

# Lance les tests Playwright à chaque push sur main + chaque PR.
# Aussi exécutable manuellement via workflow_dispatch (bouton sur GitHub UI).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL à tester (défaut: prod)"
        required: false
        default: "https://ruliz-panel.fr"
      filter:
        description: "Filtre tests (ex: 'smoke', 'visual')"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E (${{ matrix.shard }}/${{ matrix.total_shards }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # On exécute en parallèle 2 shards pour aller plus vite
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        total_shards: [2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # pnpm version lue depuis package.json#packageManager (pas version: ici
      # sinon pnpm/action-setup@v4 plante "Multiple versions of pnpm specified")
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache désactivé temporairement : le cache hit faisait croire que
      # Chromium était installé alors qu'il manquait → erreur "Executable
      # doesn't exist". On installe à chaque run (overhead ~30s, acceptable).
      # À ré-activer quand on aura validé que le pipeline tourne stable.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ matrix.total_shards }})
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://ruliz-panel.fr' }}
          CI: true
        # On exclut visual.spec.ts par défaut car les snapshots n'existent pas
        # encore (à générer en local via `pnpm test:e2e -- visual --update-snapshots`).
        # Si un filtre custom est fourni via workflow_dispatch, on l'utilise tel quel.
        # `|| true` pour ne pas fail le job — on récupère les artifacts pour
        # voir où ça plante, et on fail explicitement plus bas avec un summary.
        run: |
          FILTER="${{ github.event.inputs.filter }}"
          if [ -z "$FILTER" ]; then
            pnpm exec playwright test \
              --shard=${{ matrix.shard }}/${{ matrix.total_shards }} \
              --ignore-snapshots \
              --grep-invert "Visual regression" \
              || echo "TESTS_FAILED=1" >> $GITHUB_ENV
          else
            pnpm exec playwright test \
              --shard=${{ matrix.shard }}/${{ matrix.total_shards }} \
              "$FILTER" \
              || echo "TESTS_FAILED=1" >> $GITHUB_ENV
          fi

      # Debug : vérifie qu'on a bien généré le rapport HTML
      - name: Debug — list playwright-report dir
        if: always()
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Liste playwright-report ==="
          ls -la playwright-report/ || echo "playwright-report/ doesn't exist"
          echo "=== Liste test-results ==="
          ls -la test-results/ || echo "test-results/ doesn't exist"
          echo "=== Disk space ==="
          df -h | head -5

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload test results (videos, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 14
          if-no-files-found: warn

      # Fail le job explicitement si des tests ont échoué.
      # Permet d'avoir les artifacts uploadés AVANT de signaler l'échec.
      - name: Fail if tests failed
        if: env.TESTS_FAILED == '1'
        run: |
          echo "::error::Des tests Playwright ont échoué. Voir l'artifact playwright-report-shard-${{ matrix.shard }} pour les détails."
          exit 1

  # Job final qui agrège les rapports des shards
  report:
    name: Combine reports
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-shard-*
          merge-multiple: true
          path: playwright-report

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-combined
          path: playwright-report/
          retention-days: 30
